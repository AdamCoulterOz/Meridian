schemaVersion: 0.1
name: generic-catalog-fixture

defaults:
  globalDiscriminatorFields:
    - id
    - Id
    - languagecode

nestedSchemas:
  productMetadata:
    contentRules:
      - path: $root/color
        format: plain
      - path: $root/dimensions
        format: json

files:
  - match: catalog.xml
    root: Catalog
    discriminators:
      - path: Catalog/Products/Product
        key:
          attribute: sku
      - path: Catalog/DisplayOrder/ProductRef
        key:
          attribute: sku
    orderedChildren:
      - Catalog/DisplayOrder
    content:
      - path: Catalog/Products/Product/Metadata
        format: json
        schemaRef: productMetadata
